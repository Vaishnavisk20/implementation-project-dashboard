databases:
  - name: implementation-dashboard-db
    databaseName: implementation_dashboard
    user: dashboard

services:
  - type: web
    name: implementation-project-dashboard
    runtime: node
    plan: starter
    buildCommand: npm ci && npm --prefix apps/api ci && npm --prefix apps/web ci && npm run build:deploy
    startCommand: npm run start:deploy
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: implementation-dashboard-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: WEB_ORIGIN
        value: "*"
      - key: AUTO_SEED
        value: "true"
      - key: CSV_SEED_PATH
        value: ./apps/api/data/projects-filtered-20260713-1412.csv
